name: ci
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      run_backend: ${{ steps.set.outputs.run_backend }}
      run_frontend: ${{ steps.set.outputs.run_frontend }}
      deploy_backend: ${{ steps.set.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.set.outputs.deploy_frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/App.jsx'
              - 'src/App.css'
              - 'src/main.jsx'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'
              - 'eslint.config.js'
              - 'index.html'
              - 'public/**'
              - 'sync_media.cjs'
              - 'media/**'
              - 'Dockerfile.frontend'
              - 'nginx/**'
            backend:
              - 'src/**/*.py'
              - '*.py'
              - 'requirements.txt'
              - 'pytest.ini'
              - 'Dockerfile.backend'
              - 'tests/**'
              - 'datasets/**'
              - 'main_data.csv'
              - 'templates/**'
              - 'static/**'
              - 'scripts/**'
            infra:
              - '.github/workflows/**'
              - '.github/dependabot.yml'
              - 'fly.backend.toml'
              - 'fly.frontend.toml'
              - '.dockerignore'
      - id: set
        env:
          FE: ${{ steps.filter.outputs.frontend }}
          BE: ${{ steps.filter.outputs.backend }}
          INF: ${{ steps.filter.outputs.infra }}
        run: |
          rb=true
          rf=true
          db=false
          df=false
          if [ "$INF" = "true" ]; then
            db=true
            df=true
          else
            if [ "$FE" = "true" ] && [ "$BE" != "true" ]; then rb=false; df=true; fi
            if [ "$BE" = "true" ] && [ "$FE" != "true" ]; then rf=false; db=true; fi
            if [ "$FE" = "true" ] && [ "$BE" = "true" ]; then db=true; df=true; fi
          fi
          echo "run_backend=$rb" >> $GITHUB_OUTPUT
          echo "run_frontend=$rf" >> $GITHUB_OUTPUT
          echo "deploy_backend=$db" >> $GITHUB_OUTPUT
          echo "deploy_frontend=$df" >> $GITHUB_OUTPUT
  backend:
    needs: plan
    if: needs.plan.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pytest
      - name: pytest
        run: python -m pytest -m "not quality"
      - name: pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt -f json -o pip-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: ignore
  frontend:
    needs: plan
    if: needs.plan.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: hermes-frontend:ci
      - name: nginx-template-smoke
        run: |
          docker rm -f fe-smoke 2>/dev/null || true
          docker run -d --name fe-smoke -p 18080:8080 -e BACKEND_INTERNAL_URL=http://127.0.0.1:9 -e INTERNAL_GATE_TOKEN=smoke hermes-frontend:ci
          sleep 2
          curl -fsS http://127.0.0.1:18080/ | head -c 200 | grep -q root
          docker rm -f fe-smoke
  gate:
    needs: [plan, backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - id: aggregate
        env:
          RB: ${{ needs.backend.result }}
          RF: ${{ needs.frontend.result }}
          WB: ${{ needs.plan.outputs.run_backend }}
          WF: ${{ needs.plan.outputs.run_frontend }}
        run: |
          fail=0
          if [ "$WB" = "true" ] && [ "$RB" != "success" ] && [ "$RB" != "skipped" ]; then fail=1; fi
          if [ "$WF" = "true" ] && [ "$RF" != "success" ] && [ "$RF" != "skipped" ]; then fail=1; fi
          exit $fail
  promote:
    name: promote
    runs-on: ubuntu-latest
    needs: [plan, gate]
    timeout-minutes: 90
    if: |
      always() &&
      needs.gate.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (needs.plan.outputs.deploy_backend == 'true' || needs.plan.outputs.deploy_frontend == 'true')
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: release
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_NONINTERACTIVE: "1"
          DEPLOY_BACKEND: ${{ needs.plan.outputs.deploy_backend }}
          DEPLOY_FRONTEND: ${{ needs.plan.outputs.deploy_frontend }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          INTERNAL_GATE_TOKEN: ${{ secrets.INTERNAL_GATE_TOKEN }}
        run: |
          set -euo pipefail
          BACKEND_APP=uni-intel-core-backend
          FRONTEND_APP=hermesai
          BASE="${SMOKE_BASE_URL:-https://${FRONTEND_APP}.fly.dev}"
          deployed_be=0
          deployed_fe=0
          rollback_session() {
            if [ "$deployed_fe" = "1" ]; then flyctl releases rollback --app "$FRONTEND_APP" || true; fi
            if [ "$deployed_be" = "1" ]; then flyctl releases rollback --app "$BACKEND_APP" || true; fi
            exit 1
          }
          retry_curl() {
            url="$1"
            hdr="$2"
            n=0
            while [ "$n" -lt 24 ]; do
              if [ -n "$hdr" ]; then
                curl -fsS -H "X-Admin-Access-Token: $hdr" "$url" >/dev/null && return 0
              else
                curl -fsS "$url" >/dev/null && return 0
              fi
              n=$((n+1))
              sleep 5
            done
            return 1
          }
          if [ "$DEPLOY_BACKEND" = "true" ]; then
            flyctl deploy --config fly.backend.toml --remote-only --strategy rolling || { flyctl releases rollback --app "$BACKEND_APP"; exit 1; }
            deployed_be=1
          fi
          if [ "$DEPLOY_FRONTEND" = "true" ]; then
            flyctl deploy --config fly.frontend.toml --remote-only --strategy rolling || { flyctl releases rollback --app "$FRONTEND_APP"; exit 1; }
            deployed_fe=1
          fi
          if [ "$DEPLOY_FRONTEND" = "true" ]; then
            retry_curl "$BASE/" "" || rollback_session
            if [ -n "${INTERNAL_GATE_TOKEN:-}" ]; then
              retry_curl "$BASE/api/metrics" "$INTERNAL_GATE_TOKEN" || rollback_session
            fi
          elif [ "$DEPLOY_BACKEND" = "true" ]; then
            if [ -n "${INTERNAL_GATE_TOKEN:-}" ]; then
              retry_curl "$BASE/api/metrics" "$INTERNAL_GATE_TOKEN" || rollback_session
            else
              retry_curl "$BASE/" "" || rollback_session
            fi
          fi

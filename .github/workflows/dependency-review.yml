name: dependency-review
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-1.0-only, GPL-2.0-only, GPL-3.0-only, AGPL-1.0-only, AGPL-3.0-only

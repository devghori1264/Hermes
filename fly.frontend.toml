app = 'hermesai'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.frontend'

[env]
  BACKEND_INTERNAL_URL = 'http://uni-intel-core-backend.flycast'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    port = 8080
    type = 'tcp'
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

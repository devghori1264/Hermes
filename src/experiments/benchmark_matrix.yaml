name: Hermes Multi Domain Benchmark Matrix
version: '1.0'
domains:
- movies
- music
- commerce
- news
- education
ablations:
- name: baseline_only
  features:
  - text
  - popularity
  - recency
  ranking: pointwise_logloss
  retrieval: text_only
- name: multimodal_added
  features:
  - text
  - popularity
  - recency
  - multimodal
  ranking: pairwise_hinge
  retrieval: hybrid_blended
- name: full_graph_llm_shadow
  features:
  - text
  - popularity
  - recency
  - multimodal
  - graph
  ranking: listwise_listmle
  retrieval: graph_hybrid_blended
  shadow_llm: true
metrics:
- ndcg_at_10
- mrr
- recall_at_50
- exposure_parity
- long_tail_coverage
- calibration_error
- causal_ate
